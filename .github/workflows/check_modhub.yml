name: Check ModHub FS25

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - run: python check_modhub.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Commit seen_mods.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_mods.json
          git diff --cached --quiet || git commit -m "update seen mods"
          git push
